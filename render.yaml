# render.yaml — PowerFix
# Infraestructura como código para Render.com
# Documentación: https://render.com/docs/blueprint-spec

services:

  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  - type: web
    name: powerfix-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true

  # ── Frontend: Sitio estático ────────────────────────────────────────────────
  - type: static
    name: powerfix-web
    rootDir: frontend
    buildCommand: echo "Sin paso de compilación"
    staticPublishPath: .
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
