<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso Administrativo — PowerFix</title>
  <meta name="description" content="Panel de administración PowerFix — acceso exclusivo para personal autorizado." />
  <meta name="robots" content="noindex, nofollow" />
  <!-- Open Graph -->
  <meta property="og:title"       content="Admin — PowerFix Taller Mecánico" />
  <meta property="og:description" content="Panel administrativo de PowerFix." />
  <meta property="og:type"        content="website" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">

  <article class="login-card" aria-label="Formulario de inicio de sesión">
    <div class="login-card__logo">
      <div class="login-card__logo-text">Power<span>Fix</span></div>
      <div class="login-card__logo-sub">Panel Administrativo</div>
    </div>

    <h1 class="login-card__title">Iniciar Sesión</h1>
    <p class="login-card__subtitle">Acceso exclusivo para administradores y empleados.</p>

    <!-- Alerta error -->
    <div class="alert alert--error" id="loginError" role="alert" aria-live="polite">
      <span class="alert__icon"><i class="fa-solid fa-circle-xmark"></i></span>
      <span id="loginErrorMsg">Email o contraseña incorrectos.</span>
    </div>

    <form id="loginForm" novalidate aria-label="Inicio de sesión">
      <div class="form__group">
        <label class="form__label form__label--required" for="email">Correo Electrónico</label>
        <input
          type="email" id="email" name="email"
          class="form__input"
          placeholder="admin@powerfix.com"
          autocomplete="email"
          required
          aria-required="true"
        />
        <span class="form__error" id="emailError" aria-live="polite">
          <i class="fa-solid fa-triangle-exclamation"></i> Ingresá un email válido.
        </span>
      </div>

      <div class="form__group">
        <label class="form__label form__label--required" for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password" id="password" name="password"
            class="form__input form__input--pr"
            placeholder="••••••••"
            autocomplete="current-password"
            required minlength="8"
            aria-required="true"
          />
          <button type="button" class="password-toggle" id="passwordToggle" aria-label="Mostrar contraseña">
            <i class="fa-solid fa-eye" id="passwordIcon"></i>
          </button>
        </div>
        <span class="form__error" id="passwordError" aria-live="polite">
          <i class="fa-solid fa-triangle-exclamation"></i> La contraseña debe tener al menos 8 caracteres.
        </span>
      </div>

      <button type="submit" class="btn btn--primary btn--full btn--lg mt-4" id="loginBtn">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span id="loginText">Ingresar al Panel</span>
      </button>
    </form>

    <div class="login-card__back">
      <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Volver al sitio</a>
    </div>
  </article>

  <script src="js/login.js"></script>
</body>
</html>
